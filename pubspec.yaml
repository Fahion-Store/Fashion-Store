name: fashion_store_app
description: Fashion Store Mobile App — XAN OWNS Assignment
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  provider: ^6.1.2

  # UI / Images
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Utils
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.9
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  firebase_storage: ^13.4.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_logo.jpg"
  image_path: "assets/images/app_logo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts: []